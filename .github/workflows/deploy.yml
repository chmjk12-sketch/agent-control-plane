name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback:
        description: '回滚到上一个版本'
        required: false
        type: boolean
        default: false

env:
  APP_NAME: agent-control-plane
  REGISTRY: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67
  DOMAIN: chmjk67.top
  ECS_HOST: 39.105.86.184

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ============================================================
      # Docker 构建 & 推送
      # ============================================================
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      # ============================================================
      # 将迁移 SQL 编码为环境变量，供 SSH 步骤解码使用
      # ============================================================
      - name: Encode migration SQL
        id: migration
        run: |
          MIGRATION_FILE="prisma/migrations/20240614000000_v2_full_schema/migration.sql"
          if [ -f "$MIGRATION_FILE" ]; then
            MIGRATE_B64=$(base64 -w0 "$MIGRATION_FILE")
            echo "sql_b64=$MIGRATE_B64" >> "$GITHUB_OUTPUT"
            echo "Migration SQL encoded ($(wc -c < "$MIGRATION_FILE") bytes)"
          else
            echo "WARNING: Migration file not found: $MIGRATION_FILE"
            echo "sql_b64=" >> "$GITHUB_OUTPUT"
          fi

      # ============================================================
      # 回滚处理：如果触发回滚，使用上一版本的镜像
      # ============================================================
      - name: Resolve deploy image tag
        id: image
        run: |
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            # 回滚：使用 latest 标签（上一版本在推送前已被标记为 latest 的前一个版本）
            # 更安全的做法是拉取当前 latest 的 digest，然后使用它
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Rollback mode: will deploy previous version (latest tag)"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "Normal deploy: ${{ github.sha }}"
          fi

      # ============================================================
      # SSH 部署
      # ============================================================
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ steps.image.outputs.tag }}"
            MIGRATE_B64="${{ steps.migration.outputs.sql_b64 }}"

            echo "========================================"
            echo "  Deploying: $IMAGE"
            echo "========================================"

            # --- [0/7] 检查现有容器 ---
            echo ""
            echo "=== [0/7] 现有容器检查 ==="
            docker ps --format "{{.Names}}\t{{.Ports}}\t{{.Status}}" | sort
            echo "==========================="

            # --- [1/7] Docker 网络 ---
            echo ""
            echo "=== [1/7] Docker 网络 ==="
            docker network create caddy-net 2>/dev/null || true
            docker network ls --filter name=caddy-net --format "Network: {{.Name}} ({{.Driver}})"

            # --- [2/7] Docker login ---
            echo ""
            echo "=== [2/7] Docker login ==="
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            # --- [3/7] PostgreSQL ---
            echo ""
            echo "=== [3/7] PostgreSQL ==="
            if ! docker ps --format '{{.Names}}' | grep -q '^cp-postgres$'; then
              echo "启动 PostgreSQL..."
              docker rm -f cp-postgres 2>/dev/null || true
              docker run -d --name cp-postgres --restart always --network caddy-net \
                -e POSTGRES_USER=cp_admin \
                -e POSTGRES_PASSWORD=cp_admin_2024_secure \
                -e POSTGRES_DB=agent_control_plane \
                -v cp-postgres-data:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "等待 PostgreSQL 就绪..."
              for i in $(seq 1 30); do
                if docker exec cp-postgres pg_isready -U cp_admin >/dev/null 2>&1; then
                  echo "PostgreSQL 就绪 (${i}s)"
                  break
                fi
                sleep 1
              done
              if ! docker exec cp-postgres pg_isready -U cp_admin >/dev/null 2>&1; then
                echo "ERROR: PostgreSQL 启动超时"
                exit 1
              fi
            else
              echo "PostgreSQL 已在运行"
            fi

            # --- [4/7] 拉取镜像 ---
            echo ""
            echo "=== [4/7] 拉取镜像 ==="
            docker pull "$IMAGE"

            # --- [5/7] 部署容器 ---
            echo ""
            echo "=== [5/7] 部署容器 ==="
            docker stop agent-control-plane_app 2>/dev/null || true
            docker rm -f agent-control-plane_app 2>/dev/null || true
            sleep 2
            docker run -d --name agent-control-plane_app \
              -p 3000:3000 \
              --restart always \
              --network caddy-net \
              -e DATABASE_URL="postgresql://cp_admin:cp_admin_2024_secure@cp-postgres:5432/agent_control_plane?schema=public&connection_limit=10&pool_timeout=30" \
              -e NODE_ENV=production \
              -e SELF_URL="https://administrator.${{ env.DOMAIN }}" \
              "$IMAGE"
            echo "容器已启动"

            # --- [6/7] 数据库迁移 ---
            echo ""
            echo "=== [6/7] 数据库迁移 ==="
            sleep 10

            TABLES=$(docker exec cp-postgres psql -U cp_admin -d agent_control_plane -tAc \
              "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='Agent'" 2>/dev/null || echo "0")

            if [ "$TABLES" -gt 0 ] 2>/dev/null; then
              echo "表已存在，跳过迁移"
            else
              if [ -n "$MIGRATE_B64" ]; then
                echo "执行迁移..."
                echo "$MIGRATE_B64" | base64 -d > /tmp/migrate.sql
                cat /tmp/migrate.sql | docker exec -i cp-postgres psql -U cp_admin -d agent_control_plane
                rm -f /tmp/migrate.sql
                echo "迁移完成"
              else
                echo "WARNING: 无迁移 SQL，跳过"
              fi
            fi

            # --- [7/7] 健康检查 + Caddy ---
            echo ""
            echo "=== [7/7] 健康检查 + Caddy ==="
            sleep 15
            HEALTH_OK=false
            for i in $(seq 1 6); do
              if curl -sf http://127.0.0.1:3000/api/overview >/dev/null 2>&1; then
                echo "HEALTH_OK (attempt $i)"
                HEALTH_OK=true
                break
              fi
              echo "等待健康检查... ($i/6)"
              sleep 5
            done
            if [ "$HEALTH_OK" != "true" ]; then
              echo "WARNING: 健康检查未通过，查看容器日志:"
              docker logs --tail 30 agent-control-plane_app 2>&1
            fi

            # Caddy 配置更新
            echo "=== Caddy 配置 ==="
            # 重新生成干净的 Caddyfile（保留其他域名配置，只更新控制平面相关）
            # 使用 printf 避免 YAML heredoc 解析问题
            printf '%s\n' 'administrator.chmjk67.top {' '    reverse_proxy agent-control-plane_app:3000' '}' '' ':80 {' '    reverse_proxy agent-control-plane_app:3000' '}' > /opt/app/Caddyfile
            cat /opt/app/Caddyfile
            echo "==========================="

            # 检查 Caddy 容器是否正确挂载了 Caddyfile
            echo "=== Caddy 容器挂载信息 ==="
            docker inspect caddy --format='{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}' 2>/dev/null || echo "caddy container not found"

            docker exec caddy caddy validate --config /etc/caddy/Caddyfile 2>/dev/null || echo "Caddy validate warning"
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || {
              echo "Caddy reload failed, restarting container..."
              docker restart caddy 2>/dev/null || echo "Caddy restart failed"
            }
            # 强制重启 Caddy 确保配置生效
            docker restart caddy 2>/dev/null || echo "Caddy not running, will use new config on next start"
            sleep 3
            echo "Caddy 配置已更新"

            echo ""
            echo "========================================"
            echo "  部署完成"
            echo "========================================"

      # ============================================================
      # DNS 记录（仍使用阿里云 API，从 Secrets 读取 AK/SK）
      # ============================================================
      - name: Ensure DNS A record
        run: |
          python3 << 'PYEOF'
          import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid
          from datetime import datetime, timezone

          AK_ID = '${{ secrets.ALIYUN_ACCESS_KEY_ID }}'
          AK_SECRET = '${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}'

          def sign(p):
              sp = sorted(p.items())
              Q = urllib.parse.quote
              q = '&'.join(Q(k, '') + '=' + Q(v, '') for k, v in sp)
              s = 'GET&' + Q('/', '') + '&' + Q(q, '')
              sig = base64.b64encode(
                  hmac.new((AK_SECRET + '&').encode(), s.encode(), hashlib.sha1).digest()
              ).decode()
              return q + '&Signature=' + Q(sig, '')

          p = {
              'Action': 'AddDomainRecord',
              'DomainName': '${{ env.DOMAIN }}',
              'RR': 'administrator',
              'Type': 'A',
              'Value': '${{ env.ECS_HOST }}',
              'Format': 'JSON',
              'Version': '2015-01-09',
              'AccessKeyId': AK_ID,
              'SignatureMethod': 'HMAC-SHA1',
              'SignatureVersion': '1.0',
              'Timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'SignatureNonce': str(uuid.uuid4())
          }
          try:
              r = urllib.request.urlopen('https://dns.aliyuncs.com/?' + sign(p), timeout=10)
              d = json.loads(r.read())
              if 'RecordId' in d:
                  print('DNS OK - RecordId:', d['RecordId'])
              else:
                  print('DNS may already exist:', d)
          except Exception as e:
              print('DNS error:', e)
          PYEOF

      # ============================================================
      # 部署通知
      # ============================================================
      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          SHORT_SHA="${SHA:0:7}"

          if [ -n "${{ secrets.NOTIFY_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.NOTIFY_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"部署 ${STATUS}: ${SHORT_SHA} - ${COMMIT_MSG}\"}}"
            echo "通知已发送"
          else
            echo "未配置 NOTIFY_WEBHOOK_URL，跳过通知"
          fi
