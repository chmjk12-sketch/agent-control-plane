name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: agent-control-plane
  APP_PORT: "3004"
  REGISTRY: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67
  DOMAIN: chmjk67.top
  ECS_IP: 39.105.86.184

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      # Step A: 尝试 SSH 部署
      - name: Deploy via SSH
        id: ssh-deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            # 确保 PostgreSQL 运行
            if ! docker ps | grep -q cp-postgres; then
              docker run -d \
                --name cp-postgres \
                --restart always \
                --network caddy-net \
                -e POSTGRES_USER=cp_admin \
                -e POSTGRES_PASSWORD=cp_admin_2024_secure \
                -e POSTGRES_DB=agent_control_plane \
                -v cp-postgres-data:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "PostgreSQL started"
              sleep 10
            fi

            # 部署控制平面
            /opt/app/scripts/deploy.sh \
              --app-name ${{ env.APP_NAME }} \
              --image ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }} \
              --port ${{ env.APP_PORT }} \
              --internal-port 3000 \
              --health-path /api/overview

            # 设置环境变量并重启
            docker stop agent-control-plane_app
            docker rm agent-control-plane_app
            docker run -d \
              --name agent-control-plane_app \
              -p ${{ env.APP_PORT }}:3000 \
              --restart always \
              --network caddy-net \
              -e DATABASE_URL="postgresql://cp_admin:cp_admin_2024_secure@cp-postgres:5432/agent_control_plane?schema=public" \
              -e NODE_ENV=production \
              -e SELF_URL="https://administrator.chmjk67.top" \
              -e CP_NOTIFY_SECRET="${{ secrets.CP_NOTIFY_SECRET }}" \
              ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

            # 运行数据库迁移
            sleep 5
            docker exec agent-control-plane_app npx prisma migrate deploy --skip-generate

            # 健康检查
            sleep 5
            curl -sf http://127.0.0.1:${{ env.APP_PORT }}/api/overview && echo "HEALTH_OK" || echo "HEALTH_FAIL"

      # Step B: SSH 失败则走 RunCommand API 降级
      - name: Deploy via RunCommand API (fallback)
        if: steps.ssh-deploy.outcome == 'failure'
        run: |
          python3 -c "
          import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid, time
          from datetime import datetime, timezone
          AK_ID='${{ secrets.ALIYUN_ACCESS_KEY_ID }}'
          AK_SECRET='${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}'
          def sign(p):
              sp=sorted(p.items()); Q=urllib.parse.quote
              q='&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
              s='GET&'+Q('/','')+'&'+Q(q,'')
              sig=base64.b64encode(hmac.new((AK_SECRET+'&').encode(),s.encode(),hashlib.sha1).digest()).decode()
              return q+'&Signature='+Q(sig,'')
          def run_cmd(instance_id, cmd, timeout=180):
              b64=base64.b64encode(cmd.encode()).decode()
              p={'Action':'RunCommand','RegionId':'cn-beijing','InstanceId.1':instance_id,'Type':'RunShellScript','CommandContent':b64,'ContentEncoding':'Base64','Timeout':str(timeout),'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
              r=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p),timeout=10)
              iid=json.loads(r.read())['InvokeId']
              for _ in range(timeout//3):
                  time.sleep(3)
                  p2={'Action':'DescribeInvocationResults','RegionId':'cn-beijing','InvokeId':iid,'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
                  r2=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p2),timeout=10)
                  for res in json.loads(r2.read()).get('Invocation',{}).get('InvocationResults',{}).get('InvocationResult',[]):
                      if res.get('InvocationStatus') in ('Success','Failed','Finished'):
                          o=res.get('Output','') or ''
                          print(base64.b64decode(o).decode('utf-8','replace') if o else res['InvocationStatus'])
                          return
          instance_id='i-2zeee6djmc1qhwptmz1l'
          REGISTRY='${{ env.REGISTRY }}'
          NAMESPACE='${{ env.REGISTRY_NAMESPACE }}'
          APP_NAME='${{ env.APP_NAME }}'
          APP_PORT='${{ env.APP_PORT }}'
          REG_USER='${{ secrets.REGISTRY_USERNAME }}'
          REG_PASS='${{ secrets.REGISTRY_PASSWORD }}'
          CP_SECRET='${{ secrets.CP_NOTIFY_SECRET || \"cp_notify_secret_2024_change_me\" }}'
          deploy_cmd=f'''# V2.0: PostgreSQL + 控制平面部署
          # 1. 确保 PostgreSQL 运行
          if ! docker ps | grep -q cp-postgres; then
            docker run -d --name cp-postgres --restart always --network caddy-net \
              -e POSTGRES_USER=cp_admin -e POSTGRES_PASSWORD=cp_admin_2024_secure \
              -e POSTGRES_DB=agent_control_plane -v cp-postgres-data:/var/lib/postgresql/data \
              postgres:16-alpine
            echo POSTGRES_STARTED
            sleep 10
          else
            echo POSTGRES_ALREADY_RUNNING
          fi

          # 2. 拉取最新镜像
          docker login --username={REG_USER} --password={REG_PASS} {REGISTRY}
          docker pull {REGISTRY}/{NAMESPACE}/{APP_NAME}:latest

          # 3. 部署控制平面
          docker stop {APP_NAME}_app 2>/dev/null; docker rm {APP_NAME}_app 2>/dev/null
          docker run -d --name {APP_NAME}_app -p {APP_PORT}:3000 --restart always --network caddy-net \
            -e DATABASE_URL=postgresql://cp_admin:cp_admin_2024_secure@cp-postgres:5432/agent_control_plane?schema=public \
            -e NODE_ENV=production \
            -e SELF_URL=https://administrator.chmjk67.top \
            -e CP_NOTIFY_SECRET={CP_SECRET} \
            {REGISTRY}/{NAMESPACE}/{APP_NAME}:latest

          # 4. 数据库迁移
          sleep 8
          docker exec {APP_NAME}_app npx prisma migrate deploy --skip-generate 2>&1 || echo MIGRATE_MAY_FAIL

          # 5. 健康检查
          sleep 5
          curl -sf http://127.0.0.1:{APP_PORT}/api/overview && echo HEALTH_OK || echo HEALTH_FAIL'''
          run_cmd(instance_id, deploy_cmd, timeout=180)
          "

      - name: Register Caddy reverse proxy
        if: steps.ssh-deploy.outcome == 'failure'
        run: |
          python3 -c "
          import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid, time
          from datetime import datetime, timezone
          AK_ID='${{ secrets.ALIYUN_ACCESS_KEY_ID }}'
          AK_SECRET='${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}'
          def sign(p):
              sp=sorted(p.items()); Q=urllib.parse.quote
              q='&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
              s='GET&'+Q('/','')+'&'+Q(q,'')
              sig=base64.b64encode(hmac.new((AK_SECRET+'&').encode(),s.encode(),hashlib.sha1).digest()).decode()
              return q+'&Signature='+Q(sig,'')
          def run_cmd(instance_id, cmd, timeout=60):
              b64=base64.b64encode(cmd.encode()).decode()
              p={'Action':'RunCommand','RegionId':'cn-beijing','InstanceId.1':instance_id,'Type':'RunShellScript','CommandContent':b64,'ContentEncoding':'Base64','Timeout':str(timeout),'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
              r=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p),timeout=10)
              iid=json.loads(r.read())['InvokeId']
              for _ in range(timeout//3):
                  time.sleep(3)
                  p2={'Action':'DescribeInvocationResults','RegionId':'cn-beijing','InvokeId':iid,'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
                  r2=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p2),timeout=10)
                  for res in json.loads(r2.read()).get('Invocation',{}).get('InvocationResults',{}).get('InvocationResult',[]):
                      if res.get('InvocationStatus') in ('Success','Failed','Finished'):
                          o=res.get('Output','') or ''
                          print(base64.b64decode(o).decode('utf-8','replace') if o else res['InvocationStatus'])
                          return
          instance_id='i-2zeee6djmc1qhwptmz1l'
          caddy_cmd='''if ! grep -q \"administrator.chmjk67.top\" /opt/app/Caddyfile; then
            echo \"\" >> /opt/app/Caddyfile
            echo \"administrator.chmjk67.top {\" >> /opt/app/Caddyfile
            echo \"    reverse_proxy agent-control-plane_app:3000\" >> /opt/app/Caddyfile
            echo \"}\" >> /opt/app/Caddyfile
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            echo \"Caddy route added\"
          else
            echo \"Caddy route already exists\"
          fi'''
          run_cmd(instance_id, caddy_cmd)
          "

      - name: Verify deployment
        run: |
          sleep 15
          curl -f "http://${ECS_IP}:${APP_PORT}/api/overview" && echo "OK" || echo "FAIL"

      - name: Ensure DNS A record
        run: |
          python3 -c "
          import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid
          from datetime import datetime, timezone
          AK_ID='${{ secrets.ALIYUN_ACCESS_KEY_ID }}'
          AK_SECRET='${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}'
          def sign(p):
              sp=sorted(p.items()); Q=urllib.parse.quote
              q='&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
              s='GET&'+Q('/','')+'&'+Q(q,'')
              sig=base64.b64encode(hmac.new((AK_SECRET+'&').encode(),s.encode(),hashlib.sha1).digest()).decode()
              return q+'&Signature='+Q(sig,'')
          p={'Action':'AddDomainRecord','DomainName':'${{ env.DOMAIN }}','RR':'administrator','Type':'A','Value':'${{ env.ECS_IP }}','Format':'JSON','Version':'2015-01-09','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
          try:
              r=urllib.request.urlopen('https://dns.aliyuncs.com/?'+sign(p),timeout=10)
              d=json.loads(r.read())
              if 'RecordId' in d: print('DNS record added')
              else: print('DNS may already exist or error:', d)
          except Exception as e:
              print('DNS API error:', e)
              print('Please manually add A record: administrator -> ${{ env.ECS_IP }}')
          "
