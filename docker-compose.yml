services:
  postgres:
    image: postgres:16-alpine
    container_name: acp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agent_control_plane}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - caddy-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acp} -d ${POSTGRES_DB:-agent_control_plane}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_TAG: ${IMAGE_TAG:-latest}
    image: agent-control-plane:${IMAGE_TAG:-latest}
    container_name: acp-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-acp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_control_plane}?schema=public
      NODE_ENV: production
      SELF_URL: ${SELF_URL:-https://administrator.chmjk67.top}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - caddy-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    container_name: acp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - caddy-net
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  caddy-net:
    driver: bridge
